name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for OIDC Trusted Publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Nexus.NetTools.IPRangeParser/Nexus.NetTools.IPRangeParser.csproj

      - name: Build
        run: dotnet build src/Nexus.NetTools.IPRangeParser/Nexus.NetTools.IPRangeParser.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/Nexus.NetTools.IPRangeParser/Nexus.NetTools.IPRangeParser.csproj --configuration Release --no-build --output ./output

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push ./output/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
