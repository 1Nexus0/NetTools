name: Assign Reviewers

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Auto-assign reviewer
        uses: damianp/stale-pr-reviewer@v1
        with:
          reviewers: '1Nexus0'
