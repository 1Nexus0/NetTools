name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: true
        default: 'main'
        type: string
      framework:
        description: 'Test framework to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - net6.0
          - net8.0
          - net10.0

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: |
          if [ "${{ inputs.framework }}" == "all" ] || [ "${{ inputs.framework }}" == "" ]; then
            dotnet test --configuration Release --no-build --verbosity normal
          else
            dotnet test --configuration Release --no-build --framework ${{ inputs.framework }} --verbosity normal
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/**/TestResults/
